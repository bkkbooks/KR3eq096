body:
  text: 卷下冬傷於寒者非僅指冬時之傷中風寒正謂冬不藏精也冬不藏精之人不但冬時易感風寒亦且春易病溫夏易病暑濕秋易病燥六淫之邪無不由不藏精而致也故仲師特以傷寒名其書正欲人葆精於未病之先豈僅以傷寒一病之傷寒而名之哉厥陰只是血虛鬱熱寒實者痰熱也無熱者無表熱也小陷胸湯的是正方白散劫法也故曰亦可服亦可者非正法也麻黃升麻湯乃治誤下厥陰溫熱歹證之方千金麥門冬湯五味子湯活人萎蕤湯從此方脫胎者也文蛤散當從柯氏作文蛤湯傷寒之邪傳胃而定胃家實則力能吞併諸邪而招降制化自不致於傳變故凡傳變之病皆胃之無權者也後人都以葛根為陽明表藥亦知陽明主裡無表法耶少陽半表不可發汗況陽明乎腳攣急是血虛胃為衛之本故衛氣之健行亦藉胃陽之充實太陽亦倚重陽明也濕病脈沉細陽虛氣滯也痙病脈沉細陰枯血澀也證象陽旦一條乃血虛風燥之症因用桂枝誤汗致變故詳敘其救逆回陽仍歸補血和胃等法雖病屬厥陰陽明而卻與桂枝相疑似故列於太陽以合辨因稍有錯簡遂為千古疑團耳太陽之表已衰陽明之裡未實是謂少陽病也少陰黃連阿膠症脈數心煩已逗厥陰之機矣蓋少陰只有虛寒以君火藏而不用故也凡有熱象皆相火之所為非本病也猶之厥陰門一切虛寒之症亦少陰之所為非厥陰本病也便膿血乃厥陰熱邪用桃花湯者因痢久傷及太陰之陽故為之堵截陽明耳觀吳茱萸湯一方則知少陰犯胃的是厥陰來矣溫陽明以制厥陰則少陰自甸安矣少陽主氣故先寒後熱厥陰主血故先厥後熱厥陰轉少陽則陽機通而病退少陽轉厥陰則陽機塞而病進蔬者疏也以能疏利腸胃也鄉村小兒多蔬食故痘出稀而鮮險逆鳥雀常以生菜飼之則不生黃皆疏利腸胃食毒之功也古人蔬谷並重良有以也風寒治在太陽中寒治在少陰風溫治在少陽風燥鬱熱治在厥陰暑熱治在陽明濕溫治在太陰風濕治在太陽寒濕治在太陰燥火治在陽明太陽脈浮陽明脈大少陽脈弦太陰脈濡少陰脈微厥陰脈澀風脈多弦寒脈多緊暑脈多虛濕脈多濡燥脈多澀火脈多空溫熱病脈大疫病脈渾渾不清近年有一吐瀉而脈色並脫者此屬氣脫與暑濕霍亂不同輕者理中真武重者來復丹如救一二皆坐連年冬藏不固炎暑太過真陽泄越所致養生者冬令宜遠房幃入夏更淡口腹並戒生冷可免此等病症東垣方多偏溫燥蓋中虛則脾陽不醒寒濕內生但用甘補而不參辛通必反致壅滯矣伏暑之邪古無是説至深秋而發者始見於葉氏指南然亦從無伏至來春始發者近年則不然往往秋暑過酷冬令仍溫收藏之令不行中氣因大泄而傷邪熱因中虛而伏直至春深夏初因感他病而伏邪併發其綿延淹滯較指南所論更甚而調治之法則尤難非參耆所能托非芩連所能清惟藉輕清靈通之品緩緩撥醒其氣機或可望生若稍一呆鈍則非火閉即氣脫矣臨症者不可不熟究之也仲景謂有熱屬臟者攻之不令發汗臟者心營肺衛也攻之如千金葦莖犀角地黃黃連阿膠以及紫雪至寶秋露花露金汁之屬皆是蓋臟熱則氣血呆鈍而不靈靈其氣機清其血熱的是第一要義所謂無形令其轉旋三焦自有專司也伏暑難治固矣即平常暑濕之邪而遇中氣素虧及好酒之人亦不易調理也蓋中氣先虛而暑復傷氣暑必挾濕而濕復滯氣氣機已先呆鈍不靈用藥稍不空靈往往反增其病如因其熱而用膏連以清之稍過則氣陷而泄矣因其濕而用蔻朴以開之稍過則津涸而痙矣或因其虛而用參術以補之稍過則濕更壅熱更郁而病更甚矣夫清也開也補也不可非也而稍過不及便不應手者皆坐不明病機之進退由於氣機之轉旋故也臨症者苟能注目於氣機之靈鈍而旋轉其無形之生化則或清或開或補或兼用或全用或超然於三法之外而仍能針鋒相對不離乎三法之準繩則庶幾乎先天者未形之機不可以方所求能立方於病機未動之先是則真知先天者近世都以腎為先天夫腎特脾胃之先天耳非凡病之先天也若然則先天有方所矣豈其然乎名醫類案載人暴縮小一症蓋死病也嘉善金介峰云曾目擊一女年二十餘無故身漸縮小不半載居然襁褓醫無識者後忽思羊肉乃日餌之漸復如舊至今無恙理之所必無事之所或有此之謂矣治紫雲風方胡蔥十斤用好酒十斤煮爛去渣再入鉤藤十斤三五沸去渣將酒飲盡即愈重者不過兩服秀水曹振翁親試據云此症初起不過如蚤蝨斑一點奇癢不堪漸多漸大如遊風塊而色紅紫隔夜已蔓及遍體而手足盡腫一乞者授此方一服而愈後傳一人亦效痹症惟血痹熱痹二症最多血痹宜黃耆五物湯熱痹宜木防己湯痿症只是熱熱為本虛為標東垣清燥湯丹溪虎潛丸治痿主方也痿陽不盡屬虛有濕熱下注者滋腎丸有膽郁不伸者白蒺藜丸痙厥乃木火鬱發非水不涵木即土不培木無實症也腳氣乃濕鬱肝火臌脹亦然但腳氣氣實臌脹氣虛痘屬臟喜溫暖亦有腑熱壅盛而宜清涼者然非以清涼治痘痧屬腑喜清涼亦有臟氣不振而宜溫暖者然非以溫暖治痧費建中之論痘論疫癘也高士宗之論痧論內傷也非痘痧之正法病變不常氣血有素窮不常之病變須門門透徹葆有素之氣血要息息通靈斯可以言醫矣痘症始終以脾胃為主錢仲陽之清涼治陽明也陳文中之溫熱治太陰也陽明無燥火何必膏黃太陰無寒濕何必薑桂伏氣有二傷寒伏氣即春溫夏熱病也傷暑伏氣即秋燥冬溫病也所伏之氣不同而受病之體質亦異且邪伏既久正氣必傷故治之之法與傷寒傷暑正法大異夫痘即先天之伏氣也而可株守一説以求治乎惟其發必沿門合境有似乎吳又可瘟疫之説故費建中一以清涼為主而作救偏瑣言想其時其地適當其宜耳非必後世他鄉盡同其氣也不然何以吳又可治大疫之年即喻西昌治大疫之年也而彼則謂惟進人參者多不死與吳説大相徑庭乎學者思之識得伏氣方不至見病治病能握機於病象之先也然非熟於亢害承製之理亦豈能測未來之病乎然非謂司天運氣也雨暘寒燠在在留心久當自悟耳凡病以開鬱為先如表鬱而汗里鬱而下寒濕而溫火燥而清皆所以通其氣之郁也病變不同一氣之通耳塞則病通則安無所謂補益也補益乃服食之法非治病之法也然近世宜補之病十九不補之病十一則何也此固虛也而非病也蓋虛能幻百病東垣之所謂內傷似傷寒也而非傷寒景嶽之所謂非風似中風也而非中風無非因虛變幻由此推之如瘧如痢如痹如痞獨不許因虛而變乎因虛而致焉得不補是補者補其虛非補其病也病無補法開其鬱通其塞而已矣雖就中非無因病致虛及病不因虛而人虛之症自宜通補並進然通者自通其病補者自補其虛雖兩相兼仍兩不借也凡病皆可屬寒凡病皆可屬熱凡病皆可屬虛凡病皆可屬實頭痛身熱者同而所以頭痛身熱者不同也醫者眼光心力苟未能洞照於頭痛身熱之表寧免受病魔所瞞蓋治病者治其所以頭痛身熱而非治頭痛身熱也治寒病須察其有無熱邪治熱病須察其有無寒邪治虛病須察其有無實邪治實病須察其有無虛邪留心久久自能識病於病外而不受病瞞矣春溫一症固宜清涼然不可不照管腎中真氣以其病由冬不藏精而致恐熱邪解而真陽亦脫故邪解及半便宜參以收攝腎真如生脈都氣之屬若浮陽不潛附子亦可加入如國手下棋遙遙先布一子看似間著殊不知正是收局時之要著蓋衆人較量官子而國手胸羅全局也今之見病治病而後來緩不及事者皆較量官子而失全局者也無論大病小病都要通盤打算獅子搏象用全力搏兔亦用全力仲景過人處亦只是思致周密耳粗心人斷斷不可為此事也暑熱無不傷氣補氣而不清暑熱氣雖復而暑熱未必全消必待秋涼冬冷方得潛融默化若秋暑仍盛冬令過溫則熱伏不化直至入春陽氣開發乃漸漸乘機竊發治法輕者涼膈解毒重者承氣紫雪不但大忌參耆呆補即地冬亦在所慎以熱伏既久氣壅不宣故也觀仲景用人參於白虎東垣用益氣於清暑治虛而仍以理邪為主自無將來留熱遺患之弊因知古人雖隨時應病立方無不通盤打算後人草草看過有負多矣濕熱膠固之邪最不易治要惟熟讀西昌石頑諸家精通其義不泥其方而變化出之者庶幾得之寒病少熱病多寒病易識亦易治以其無變端也熱病變幻不測故難識難治如傷寒熱病也故傳變不常若中寒則顯然易見亦易治始終不變也稍有變端必病已化熱應作熱論矣六淫之邪皆從火化能調火病百病渙然冰解矣吾吳前輩吳正功只教人看醫方集解徐炳南晚年案頭只兩本廣筆記青浦吳元常以臨症指南為枕中之祕甪里平孚亭於己任編亦然可見心得處不在多也然無心得者不得以此藉口欲求心得正非多讀古書不可蓋不博亦斷不能約也人心無火則無孽人身無火則無病或曰真火奈何余曰古無所謂真火之説也難經但曰腎間動氣後人乃有命門真火之説其實命門非水非火秉於有生之初生生之元氣耳寒邪直中元氣飛越故用桂附驅散寒邪而元氣回非補火也熱極而元氣亦脫古人用生脈散六味以回其元氣者亦補火歟火與元氣不兩立豈有元氣虛而反補其火者歟此説始於立齋原為內真寒而外假熱之症而説初不教人專以補火為事也丹溪曰氣有餘便是火蓋平氣即所以清火清火即所以平氣也而景嶽乃曰氣不足便是寒然則補氣即可以驅寒驅寒即不須補氣乎殊為費解吾恐氣不足正因火耳火與元氣不兩立也經曰少火之氣壯壯火之氣衰景嶽之説似於少壯承制之理尚欠分曉東垣曰內傷極多外傷間而有之丹溪曰凡證與傷寒相類者極多皆雜症也雜病亦有六經所見之證故世俗混而難別由此觀之今所謂傷寒者豈真傷寒哉吾行道四十餘年所治內傷十之七雜病十之三未見一真傷寒也古人豈欺吾哉壯水之主補腎也益火之源補心也後世以腎氣丸為益火之方恐非確論胃虛宜補腎氣脾虛宜滋心血心腎為脾胃之源脾胃為心腎之交胃實宜降肺陰脾實宜升肝陽肺肝為脾胃之用脾胃又為肺肝之紐心腎肺肝無不交紐於脾胃此脾胃之所以獨立一科而東垣立齋之所以自成一隊歟心生脾而脾生肝肝復生心腎生胃而胃生肺肺復生腎心脾肝主血腎胃肺主氣今人知心生血脾統血肝藏血而不知腎生氣胃統氣肺藏氣人知木剋土而土剋水而不知水生土而土生木二神丸可以健胃非腎生胃乎建中湯可以養肝非脾生肝乎徐靈胎具有卓識但欲超劉李朱薛而遠紹漢唐恐無是理立法雖千古不易用方須應時相傳豈有千百年不變之風氣耶丹溪謂瘦人心下痞乃是鬱熱所致此即立齋鼓峰輩用滋腎生肝飲及逍遙合左金之證也鬱熱化燥自宜滋清若鬱熱生濕則仍當以涼膈通聖等方為主滋膩在所禁也後人往往咎丹溪偏用芩連知柏殊不知丹溪本為濕熱立法不為燥熱立法也若血燥生風之症丹溪亦不用芩連知柏矣繆仲醇佩服丹溪者而立方都偏滋潤豈丹溪家一味苦燥哉凡上年秋冬不寒而入春反寒之年肝家必多鬱熱腎氣自少藏聚縱當清疏肝鬱不可不照管生陽蓋邪火與正火已混合一區恐正隨邪盡也且肝本無熱也因木不條達鬱而生熱而木不條達則由於脾無正火而脾無正火則又由於腎失藏聚然則肝之邪火即脾之正火但藏於腎而為正鬱於肝而為邪使腎氣得藏則脾土溫暖肝木條達而鬱熱自化矣何待疏耶即使木火亢甚亦宜連附或萸連並進斷斷不可偏用苦寒致貽得指而失肩背之誚也逍遙散加連炒吳萸煎湯吞附子都氣丸庶幾近之此又春溫門一內傷變局較陰旦陽旦更上一層樓矣納氣之法不一如腎經寒濕而致氣不歸原者治以真武湯衝脈伏熱而致氣不歸原者治以滋腎丸陰不戀陽而致氣不歸原者治以都氣丸此皆氣之不歸而非氣之虛也若氣虛不續自宜以保元為主不但溫清並繆即滋納亦隔靴搔癢矣同一治內傷也東垣是飢飽勞倦之傷立齋是思慮色欲之傷若近年卻是秋暑冬溫之傷既已消耗於酷日又不使斂藏其殘喘中氣幾何寧不困憊故近年治法總以培植中陽為第一義如異功散加五味炮薑木香可為主方面白如傅粉者再加黃耆歸桂如有伏熱佐使兼顧燥熱加麥冬濕熱加萸連但不可過劑若中陽既醒便去薑桂一以生脈六君調理病因暑傷仍歸暑治辛熱之品亦不得過劑也沈良哉兄向有目疾因上年冬暖未免房勞入春暴寒以致浮陽不潛目赤疼痛兩脈濡細尺部尤空用附子都氣去澤瀉加牛膝細辛兩劑痛止而紅不退因思相火之僭不僅腎氣之浮越亦由君火之無權也乃減去細辛加入棗仁龍齒菖蒲遠志四五劑而紅全退矣可見目疾之必關心也凡伏暑傷中之症亦必以補心之藥收功以暑喜歸心故也李述翁去秋病伏暑晚發症自初起至向安約百餘日寒熱如瘧不寐不飲不納大便不行者三十餘日小水點滴疼痛舌苔如漆豫因知其為內傷也不論其症不論其脈直以參耆退其寒熱以參耆通其二便以參耆化其舌苔以參耆安其眠食而已就中佐使如柴胡石膏生地竹茹首烏歸藥梔翹之屬無不出入參耆則無日無蓋翁由綿州解組旋里寄迹鴛湖水陸之勞八千餘里寒暑之侵風水之憂兼之令侄病殤二女未嫁妻妾善病望七老翁其心境為何如哉見病治病其能免乎同時有葉丈者與翁同病亦且同庚而納穀安眠強翁十倍邀余診治余用金匱麥冬湯商之他醫咸謂必邪盡方可投補乃日從事於犀角石膏漸至胃閉不納虛陽浮越頭項發腫而醫者猶作暑瘍論治以致腫勢日盛復邀余診則脈色並脫矣惜哉為醫而不知歲氣之亢害承製人情之苦樂勞逸死板醫書不能會通古今之全局而欲操活人術吾誰欺欺天乎大人小兒同一時也伏邪痘疹同一義也近來大人伏邪多挾內傷補正為主理邪佐之每歲經治無不盡然間有不需補者亦不多也何小兒痘疹火毒之盛亙古不變而犀連膏黃動手便用耶每當發痘之死喪無算吾恐死於痘者十之三死於藥者十之七豈今之兒醫但知有費氏一家如陳文中魏桂岩萬密齋聶久吾諸家全不知耶抑劫數耶傷哉今春所見皆冬不藏精春傷於寒之症冬不藏精則脾失溫養而肝木無氣不能條達春傷於寒則無氣之木更郁不伸而屈曲化火其病多微寒微熱微溏心疼熱口乾苦脈則細軟弦澀治之之方溫攝脾腎為主清疏肝鬱為佐豫用人參山藥五味益智菟絲以固其本參入柴胡白芍青皮萸連以理其標往往見效不用大苦大寒恐更敗其胃不用大辛大熱恐更傷其氣但用從引法使之自歸自化而卻病於不覺也若立方稍不平淡則病不服而激變矣今年之病只有養之一法己任編有養汗之説雖一隅之舉正今日之救命金丹矣汗下溫清無不宜養直汗直下直溫直清皆殺人也然非蠻補也古今醫案載沈堯峰治大頭天行一案深得養法之妙精玩之可悟治近年之病沈友山幼女出痘延專科治之曰乾紅渴飲火毒痘也立方用犀角黃連等藥且云險中之險六朝關節友山素奉孫真人因詣云豫堂求請簽方而不服醫藥不數日灌漿結痂而愈其簽方則參耆歸朮桂附等也使進犀連尚有生理乎痘症不必延醫痘果逆醫斷不能生之痘本順醫反足以殺之寧守中醫之戒有外感者有內傷似外感者有內傷挾外感者同一頭痛身熱不可不各求其故也邪祟亦外感也陰虛感熱陽虛感寒神虛感鬼血熱肝痛亦能發黃蓋血本濕類氣鬱生熱則蒸黃矣許氏甘露飲最合鶴膝風乃足三陰不足之症斷不可用風藥痙病燥病也喻西昌謂秋傷於燥吾亦謂諸痙項強皆屬於燥觀仲景於項背強用桂枝加葛根加栝蔞根二湯於腳攣結用芍藥甘草湯都以生津養陰為主則其為燥病顯然矣酸症總因肝鬱但致郁之由不同有風寒外郁有濕熱內郁有氣虛木不條達有血虛木失滋潤以及氣阻食滯皆能作酸治之當各分其因不可混用左金一方陰虛火炎而致失血丹溪用知柏則往往敗胃瀕湖用丹皮亦未免辛散豫每重用山藥一二兩時見奇功蓋陰火上炎總屬脾虛不能坐鎮中宮任脈失其擔任而致苦辛焉能中竅山藥甘淡性澀大補脾陰脾陰固則陰火自潛矣血病初起必先調氣氣病日久必佐調血治虛勞用丹溪法往往致敗然豫曾治盛川一婦年未三十咳血夜熱一側眠飲食大減口苦脈來數軟用阿膠三錢貝母二錢川連七分米仁地骨皮各三錢青蒿一錢鱉甲五錢川柏一錢四帖胃口大啓後用四物知柏柴胡鱉甲丹皮八帖全安先是其兄咳血畏寒求治按脈偏弦知其飲邪與苓桂術薑湯加五味半夏杏仁而愈乃同其妹就診豈知病同而所因霄壤因知東垣之甘溫治氣分之虛火丹溪之苦寒治血分之實火各有攸當不可偏執也曾治骨蒸熱勞用紫雪及生石膏露而愈者外臺聖濟等方豈可不考拔管藥條方一江湖醫者試過余以萬錢得之白礬一兩膽礬三錢白人言三錢用生豆腐煮過火硝三錢水銀一兩銅緑三錢錫粉三錢以上七味同入小鐵鍋內用粗厚中碗蓋好無令走氣再用桑皮紙拈條以封碗口再加生石膏末將紙條蓋沒再少用白礬末水調灑石膏末上其碗底用生緑豆一撮鋪平然後政放上煉三炷香老管用此新管用巴豆油八分生石灰一錢銅緑三錢斑蝥五枚鹼一分共研細末入生石膏入用洗方紅花荊芥歸尾生川烏各一錢酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也喘而汗出者葛根黃連黃芩湯主之太陽病桂枝症醫反下之利遂不止脈促者表未解也桂枝人參湯主之此兩條錯簡注家都順文牽合故訂止之心氣不足痰火素盛一下而陽邪內陷神怯煩驚直犯少陽之腑故立方以鎮膽為主柴胡參半溫存膽氣鉛丹龍牡重鎮膽怯桂苓通太陽之陽大黃調陽明之陰共勷清肅膽府之功也救逆湯之蜀漆乃蜀黍之誤古漆字無水傍與黍相似故也黍為心谷用以救驚狂起臥不安者取其溫中而澀腸胃協龍牡成寧神鎮脫之功也二千餘年惟柯韻伯疑非常山之苗而不知蜀漆之果是何物故特正之此余聞之方大章先生者先生名燮吳中詩伯尤工書法袁倉山梁聞山二老之高第弟子精於醫太陰提綱若下之必胸下結硬非下太陰也太陽誤下而成結胸與痞則屬太陰便當於桂枝人參湯枳實理中丸二方消息之少陰雖屬君火以藏為用其體常虛惟賴太陽衛之於外而表寒不侵陽明鎮之於中而裡寒不起若衛陽不固而胃陽尚強寒邪猶未便斬關直入惟是胃陽失守寒水無制鼓厥陰之風而厥逆挾太陰之濕而下利則真火立見消亡矣以此知衛陽尚倚胃陽為根蒂而三陰則無不仰胃陽為柱石可不重歟凡少陰之宜滋清者皆屬厥陰而厥陰之用溫熱者則皆少陰也以厥陰風化內藏少陽相火而少陰雖屬君火實主太陽寒化厥陰轉陽明則病退轉太陰則病進故戒下下之利不止陷生陽而入絶陰也厥陰病之生死全看胃陽之進退故以少陰負趺陽者為順也少陰負趺陽太過不過咽痛便膿血耳故為順也若趺陽負少陰則厥利不止而去生遠矣肝為血海故厥陰病以亡血為眼目觀熱厥之四逆散寒厥之當歸四逆湯並以柔潤為主可知剛燥之非宜矣又可知厥陰門之薑附斷斷為少陰設矣鄉里小兒遺屎於地十日半月之後其土中必有一黑殼蟲飛出俗名屙夾蟲據吳西林雲伊族叔小盧先生曾治一人得屙奇疾諸藥無效後於先世所遺破書堆中得一方投之立愈蓋用屙夾蟲為末生軍三錢煎湯調服也病果奇方亦神矣傷寒胃家實則不復傳變胃家虛則變證蜂起於此見東垣果得仲景之心印也丙申秋冬不雨丁酉春夏沉霪血素虛者木鬱不宣加以雨濕傷脾木邪郁發夏秋之交吐瀉轉筋者比比厚朴溫中湯當歸四逆湯固是正治然黃連香薷飲參合四逆散者亦復不少可見不盡屬寒也豈可與庚辰辛巳年之寒疫同論哉趙養葵高鼓峰用逍遙六味以治傷寒蓋暗合仲景厥陰門正法後來葉天士乃溯源於復脈及黃連阿膠等方雖曰承接西昌其實四明諸老先有以啓之矣金蟾化管丸水銀三錢雄黃一兩大蟾一隻銀硝一兩明礬一兩先以水銀雄黃用火酒二斤漸煮漸添酒盡為度共為末用紙包好取大蟾去腸留肺肝以藥納入縫好另用銀硝明礬研末入陽城罐加水半茶盅放火上熬干於底入蟾於內升文火二枝中火一枝武火一枝候開看刮下靈藥用蟾酥汁為丸如芥子大聽用凡管用一丸放管口外蓋膏藥自入至底雖彎曲處能到嫩管自化老管自退七日見效如不全退再用一丸無不除根海寧蕭貫齋傳乃郎親試過倭煙之性大概升提而澀斂故初嗜之能醒睡興陽攝痰消食平肝止瀉然大耗津液尤傷中氣故久嗜之必反痰多泄痢痿陽減谷遺精消瘦甚至愈病愈嗜愈嗜愈病以至於死無苟免者誠大劫數蓋自作孽也癮未深者痛自懲艾用真川椒或白芥子或吳茱萸日日吞服亦可漸戒即念稍深者日服上藥大進補益亦可漸減但見斷煙者數人往往煙止而壽亦不永可見此物之毒人者深矣故凡煙客有病當同大虛人感邪例治不可見病治病憑脈立方也若因煙致病則萬病萬死和扁卻走者矣金匱痰飲門甘遂半夏湯劫法也故用甘草以激甘遂之悍以逐飲邪之留伏也趙以德程云來並謂用甘草以緩甘遂之峻恐未然煮馬蘭飽吃可治內癰試效者非一人矣蕭貫齋傳時同人在吳山啜茗望隔江山色桐鄉馮春墅少尹亦傳一治臁瘡夾膏方用沒藥二錢輕粉二錢叭噠杏仁八粒去皮尖上三味共為細末用脊髓大者一條小者可兩條去衣搗和用老油紙如瘡口大小一面刺滿細眼夾好縛於患處重者兩三膏無不愈丁酉十二月二日書於武林郡齋墓頭回一名雞糞草切片每服二錢用水酒各一盞煎服治婦女血崩及經事淋瀝等證神效此藥在北京正陽門外同仁堂兌每斤八百大錢上海王協中先生言血症愈後每多反復此由胃膜破傷須用法補之訂方用白及魚膘絲綿燒灰等分丸服永不復發一人唇上一瘡血出如箭月餘不止醫治無功自分死矣忽夢其先亡語用栗一枚連殼燒灰同硫黃等分研末和敷而愈以上二則見新安程杏軒醫案杏軒著有醫述惜覓之未得百合狐惑陰陽毒皆厥陰病也故匯為一篇太陽主營衛營出中焦營氣虛者必加人參以建其中衛出下焦衛氣虛者必加附子以固其本傷寒脈浮自汗出小便數心煩微惡寒腳攣急厥陰血虛風熱芍藥甘草湯症反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽救逆若厥愈足溫者更作芍藥甘草湯與之其腳即伸正治若胃氣不和譫語者胃氣生熱少與調胃承氣湯若重發汗復加燒針者其陽則絶四逆湯主之因甘草乾薑湯加附子參其間附子溫經亡陽故也問曰證象陽旦桂枝按法治之而增劇厥逆咽中干兩脛拘急而譫語師言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風風熱大則為虛血虛風則生微熱虛則兩脛攣病症象桂枝芍藥甘草湯症增桂令汗出厥逆咽中干煩躁陽明內結譫語煩亂更平聲飲甘草乾薑湯若重發汗復加燒針者因加附子參其間附子溫經亡陽故也四逆湯主之夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈此二條厥陰救逆症脈浮而芤浮為陽胃陽芤為陰厥陰浮芤相搏胃氣生熱胃陽其陽則絶厥陰厥陰病熱多厥少為病退胃氣生熱也厥多熱少為病進其陽則絶也故少陰負趺陽者為順趺陽負少陰者必逆厥陰為陰之絶陽也陽明病反無汗陰不得有汗也而小便利病不在氣分也二三日嘔而咳手足厥者厥陰必苦頭痛三陰惟厥陰有頭痛若不渴不嘔手足不厥者頭不痛非厥陰血虛火動矣乃陽明液燥不汗也陽明病但頭眩不惡寒故能食中風而咳其人咽必痛厥陰風火上攻若不咳者咽不痛非風火矣胃未和也此二條陽明厥陰疑似症病人有寒復發汗胃中冷必吐蛔此即趺陽負少陰之厥陰病也縱橫二症及熱入血室諸條皆厥陰血虛風火之症痙病諸條有曰發其汗其表益虛謂之益虛則未發汗而表自虛矣有曰無汗而小便反少則不因汗而里自虛矣有曰風病下之則痙厥陰血液下竭也有曰發汗太多致痙太陽津液外竭也有曰瘡家發汗則痙蓋津血重傷也由此參觀痙之為病其人體質本自血虛風燥更外感風寒暍濕等邪治不如法燥極而成者也竊宜與霍亂同參不僅與濕暍合論也蓋霍亂吐瀉固屬太陰濕土為病而所以致上吐下瀉者實由厥陰風木乘脾而鬱發也故其眼目全在陽明必以趺陽不負為順如胃家實者既吐瀉則濕鬱已發而風木自息倘胃家不實而陽虛則風木必挾寒水以凌脾吐利不止而四逆胃家不實而陰虛則風木必煽相火以竄絡拘攣不伸而痙急蓋陽虛者風從寒化陰虛者風歸火化霍亂與痙總以趺陽為柱石者其病同源也籲霍亂為太陰病知之矣而所以致霍亂者屬厥陰人未知之也至於濕竭化燥動風竄絡之痙病應屬何經應從何治無怪其更不知矣二千年來厥陰一病真同長夜良可嘆也痙者風燥病也縱挾寒濕外邪必兼顧胃津肝血故仲景治太陽中風用桂枝湯薑桂固溫散太陽芍棗甘草非滋養厥陰乎在天為風在藏為肝肝藏血治風先治血也況痙固筋病乎百合心包絡病也傷寒汗吐下後大邪雖解津液未回餘熱熏蒸肺不清肅膻中鬱結而成蓋熱病後之餘邪也肺朝百脈心為百脈之一宗故所用諸方不外清肺通絡養心泄熱而已若燥澀甚者復脈湯可以商進也亦有不經汗吐下而病者非傷寒遺熱乃離愁菀結喜樂不宣所致大約與臟躁相類惟臟躁屬足厥陰肝血虛膽氣不伸百合屬乎厥陰心包血熱而肺津不降為稍異其為血虛氣鬱則一也狐惑亦傷寒病後遺邪氣血不清厥陰風熱鬱蒸之證較陽毒陰毒則略輕較百合則已甚矣陽毒陽經之熱毒陰毒陰經之熱毒名之曰毒自當以解毒為第一義矣後人有以中寒為陰毒者豈其然暑邪入肝為瘧乃千古要訣欲其提散必需柴胡欲其清解必用青蒿肝燥欲潤可用鱉甲但寒不熱謂之牡瘧乃熱鬱使然開提可效痢疾外有頭痛身熱胃風者脈多浮數用香蘇散香用藿香加建曲滑石銀花炭生山楂肉如赤白相兼重用楂肉以和血如系裡症亦屬吸受時令暑濕拒格三焦用滑石為君生薑渣建曲蘇梗鮮藿香荷葉汁稻秧如赤多加荷藕數片胸膈拒痛作痞加炒銀花蒲公英如裡寒症枳實理中真武湯虛症必久痢休息因病致虛斷無因虛致病者也臌症濕邪入絡居多消滯利水徒傷氣分焉能奏績定方用新絳一錢半蜣螂蟲二錢延胡索一錢半絲瓜絡一枚淡木瓜一錢半川通草一錢路路通十枚生米仁八錢陳香櫞皮半隻干佛手三片川鬱金一錢遠志八分即此數味加減出入自能奏捷至消滯莫如紅曲雞內金達下莫如車前子降氣莫如蘇子川貝咳嗽新病辛以散之久而虛者甘淡為妙如沙參川貝米仁玉竹叭噠杏川斛蛤殼之屬阿膠絶無真者濫用反致膩膈滯痰礙胃減食吐血必理外感徒以涼血為害非小消症總屬痰火竹瀝之外繅絲湯亦妙霍亂系疫癘滯而不宣所致有用熱藥幸而全乃郁散而然豈真有寒霍亂耶如鄉僻之所只消鮮藿香煎服為妙若轉筋揉拿刺刮或用棉紗線煎湯顧亦能通絡至如大順散附子理中等此因暑而過進冰水瓜果所致之方另是一症不可漫試也病名中風其實不拘六淫何邪入於血分絡中肝風因之而動當審證用藥不可株守成法以上八則不知何人手筆在己任編眉間雖未盡善然非三折肱者不能具此妙悟也故録之嘗治一徽商積虛痰喘用金水六君加熟附細辛五味煮米仁漿丸外用水澄生半夏生薑二粉為衣終劑而十餘年之疾如失後治數人並效北蘆埂陳姓子年二十許手足拘攣脈虛無力作血痹治用黃耆五物湯加黨參熟附歸身虎骨百餘劑始能行動乃去附子加枸杞白蒺藜杜仲陳皮百劑全安五弟潤齋縱酒失血成盆不止自覺少腹洶洶如潮上湧醫用大劑鎮補罔效時豫寓聞川急足促歸見其面色純青脈數舉按無力肝傷竭矣非大劑甘緩不可用炙甘草二兩炮薑五錢濃煎一劑吐緩三劑全止繼與人參養榮峻補半年而安損其肝者緩其中也方大章師之第三世兄一日忽惡寒之至蒙被晝寢頃刻吐鮮血盈盆師自脈之曰緊甚此中寒也投以麻黃附子細辛湯一啜而愈周惠泉酒濕凝寒少腹㽱痛桂附薑椒雜進半載如水投石乞方於師授以茅朮吳萸各三錢小水如注其痛若失不復再劑濁陰出下竅也客謂小柴胡轉少陽陽樞四逆散轉少陰陰樞又曰陽在陽位陰在陰位陰陽不相順接故厥治者當下其陽於陰如苦辛酸輩若以厥為寒而誤與辛溫發汗則動其陽部之陽必致口傷爛赤矣
