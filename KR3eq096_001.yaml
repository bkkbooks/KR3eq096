body:
  text: 卷上傷寒雖分六經而三陽為要而三陽則又以陽明胃尤要以胃主生陽故也若三陰不過陽明胃裡事耳未有胃陽不虛而見太陰證者亦未有胃陰不虛而見厥陰證者至於少陰尤為陽明之底板惟陽明告竭方致少陰底板外露若陽明充盛必無病及少陰之理蓋少陰有溫清二法其宜溫者由胃陽偏虛太陰濕土偏勝而致其宜清者則由胃陰偏虛厥陰風木偏勝所致陽明偏虛則見太陰厥陰陽明中竭則露少陰底板故柯韻伯以陽明為三陰之外護可謂卓見然愚以謂陽明亦三陽之同賴也如太陽宜發汗少陽養汗汗非陽明之津液乎太陰以溫為主救胃陽也厥陰以清為主救胃陰也由太陰濕勝而傷及腎陽者救胃陽以護腎陽由厥陰風勝而傷及腎陰者救胃陰以滋腎陰皆不離陽明治也邪在太陽須藉胃汁以汗之邪郁少陽所謂半表半裡經絡之間從乎中治者須藉胃汁以和之養汗以通元府之法也謂之養汗者太陽宜汗陽明禁汗少陽則不宜汗而欲其汗不禁汗而非發汗欲陰陽自和而如時雨之化者也傷寒一證全藉陽明非至要至要者乎傷寒論最重桂枝柴胡二方百十三方從桂枝柴胡出者實居大半可見治病以和為貴偏寒偏熱不得已也今之傷寒皆溫熱病也如太陽之麻桂青龍等證無有也初起只須蔥豉合清心涼膈或陽旦或葛根芩連或柴連溫膽之屬散表邪兼清裡熱令其微汗而解如熱仍不退漸覺口乾舌燥便當撤去表藥參入玉竹天麥冬生地之屬以存津液略佐薄荷葉等輕揚清透若舌潤不渴而見胸痞噁心可於前蔥豉等散表清裡方中枳桔小陷胸瀉心之類寬胸消痞此氣窒不宣故宜辛泄不必滋清若津液既傷壯熱渴飲須玉女煎竹葉石膏湯大滋胃液若再煩悶舌絳須防斑點急進犀角地黃化入至寶牛黃以清包絡即不傳包絡胃液既劫尚防厥陰風動而致痙厥熱痢宜復脈及黃連阿膠白頭翁等選用以清滋少陰此大略也若作太陽傷寒治失之遠矣溫熱病利小便用豬苓湯暑濕病利小便用桂苓甘露飲傷寒以陽為主陽司開故治太陽太陰表寒散太陽裡寒溫太陰也溫熱以陰為主陰司合故治陽明厥陰實熱清陽明虛熱滋厥陰也寒熱不齊從乎中治中為樞也故治少陽少陰或從樞而開或從樞而合旋轉陰陽環應不忒也伏邪都屬伏氣鬱發蓋所受者非一氣所積者非一年蘊於異所無關經絡藏府風寒觸之而不動也暑濕觸之而不動也必俟天地之大氣轉旋虛空之伏氣鬱發而後人之有伏邪於氣機之隱微者應焉故其發也往往充徹藏府彌滿三焦難分經絡且其氣錯雜非可以常法構也然大旨不外苦寒清熱芳香解毒而已以郁久而發縱有寒濕亦變燥熱也然此猶言其常也如近年來寒濕伏邪亦正不少如東坡聖散子自明以來從無用者而今則應用頗繁總之時行之邪當因時制勝不可拘守成法亦不可偏信司天運氣之說而致迂遠不切但起熱病論傷寒論熟讀精思更參之後世各家名論如或論傷寒或論溫熱或論暑濕或論溫疫或論中惡等書讀之久久得其氣化之會通則自能握其制化之要領矣內無伏氣縱感風寒暑濕之邪病必不重重病皆新邪引發伏邪者也惟所伏之邪有微甚有偏全人之藏性有陰陽有強弱故就中又有輕重之分焉大抵治伏邪總以通陽為主通陽非用溫之謂雖用硝黃亦通陽也清陽旋轉節節通靈何伏邪之不消散乎無形令其旋轉三焦自有專司葉天士可謂聰明絶世內科於瘍症多不甚留心故方法亦不甚精熟然腸癰有腹痛吊腳肩痠沉重肌膚甲錯可辨肺癰有咳唾臭痰胸前隱痛可辨故不致南轅北轍惟脈痔一證與便血初無分別而內科則僅知為便血而已殊不知脈痔十居八九凡三年五年以至數十年不愈之便血皆脈痔也夫陰絡傷則血內溢是謂便血病關藏真死生參半豈有久延之理痔血出於腸府故雖年久不致疲憊此症最多不可不知今治風邪都用辛散表藥不知風從燥化汗為津液於仲聖桂枝柴胡二方所用人參芍藥甘草大棗之意可謂全無理會孫真人謂凡中風多由熱起可為要言後世繆仲淳王肯堂頗領其旨金匱防己地黃湯用地黃獨多千金中風門用地黃麥冬等汁者亦不少可見風邪化燥而治風必先治血也後世此旨不傳乃有真中類中之別其實類中固宜固本而真中亦無一味辛散之理徒自妄生分別耳傷寒論只百十三方而治風治寒治暑治濕治燥治火治氣治血治痰治食治水治蟲等法無不備焉今人皆以傷寒為不全之書謂之未讀傷寒可矣試思東垣立齊暢論內傷能出建中復脈範圍否河間震澤暢論熱病溫疫能出白虎承氣範圍否喻西昌獨出手眼擅改內經快談秋燥能出竹葉石膏範圍否而尚謂之非全書真同說夢矣左心小腸肝膽腎右肺大腸脾胃命之說本於難經脈經非高陽生之杜撰況以六氣配六部確有至理未可非也西昌乃謂二腸脈不當混處心肺清虛之上吾謂不然手經皆自手走頭若二腸脈不應同診於兩寸則二腸經亦不應上行之頭矣況六部皆手太陰也降寸於尺何殊五十步百步耶脈位之說吾所見者有四難經脈經脈訣一也景嶽西昌士材所注脈要精微論二也褚氏遺書三也韓氏醫通四也可以合參不可偏主一說近見葉天士醫效祕傳一條亦佳可以參觀凡病皆當合參不可偏主一說如舌苔白如積粉就吳又可而論乃疫邪初離募原達原飲證也而王絳雪又謂戊午歲自春徂秋民病毋論三因舌苔白者居多有白滑白屑白粉之異用薑附則白苔厚而液燥用芩連則手足冷而陽脫因制薑桂湯薑汁為君辛潤泄衛肉桂通營佐以參歸南棗甘補應手而愈若進吳氏法豈不大謬楊汘村以舌胖為陽虛之微然須與腫大有辨腫大而紫乃是酒毒舌色如豬肝胃敗之象病多不起看溫熱時邪以驗舌為要而驗舌之法以辨燥潤為要舌起煙煤總屬胃虛急宜甘溫醒胃平生經手用人參養營起者甚多不可拘牽外象之寒熱等證也傷寒溫熱時邪以渴不渴為要訣不渴者用柴胡小陷胸枳桔瀉心等為一隊渴者有二傷上焦津液者用玉女竹葉石膏犀角地黃等為一隊傷下焦津血者用白頭翁復脈黃連阿膠等為一隊蓋肺胃心包宜甘寒腎肝宜參苦泄苦以堅陰也若調治非法而致實結宜下或絡閉宜開攻伐太過而致正虛宜補或陽亡欲回則皆屬壞病隨機應變可也麻黃青龍之真傷寒證江浙絶無斷不可用惟冬溫為秋燥之餘氣即伏暑之類而更感寒邪束之間有用麻杏石甘者亦不多見也若尋常冬溫只須蔥豉湯加玉竹桔梗白薇青木香生甘草足矣暑瘧多燥其治在肺重者人參白虎或竹葉石膏加厚朴輕者杏仁滑石蔻仁絲瓜葉蘆根米仁之屬濕瘧多寒其治在脾宜苓桂朮姜或消暑丸之屬暑濕兩甚者桂苓甘露加草果知母久瘧多虛四獸飲歸耆建中之類更吞鱉甲煎丸白痢濕化雖主大腸而內關脾臟赤痢風化雖主小腸而內關肝臟故白耐剛而赤耐柔也久則同歸於腎矣或煦督陽或濡任陰皆治腎也今人用藥全不察臟性之耐剛耐柔聞有治腎之說便泥熟地為久痢要藥殊為可嘆闢如五苓散太陽之剛劑也而導赤散柔劑也平胃散陽明之剛劑也而白虎湯柔劑也就一方而論如桂枝湯桂枝生薑剛藥也而人參大棗柔藥也或剛劑而參以柔藥或柔劑而參以剛藥無非因臟性之體用病機之出入而為之錯綜變化約之雖一言可了推之實神變無窮虛能生百病因虛而致病者斷不可見病治病然亦不可蹈蠻補之弊當因證變通隨時消息如中風一症可用續命三化等湯者固絶少若一例地黃飲子亦非法也漢唐人用丸子補藥所服甚少不過十粒二十粒而止此意最精蓋服藥如吃飯必上頓消盡然後能吃下頓惟其消化之盡而人之精神便充長於生生化化之所謂造化存神也若消有不盡便屬停滯反為害矣服藥亦然必藥之渣滓氣味消融盡淨而藥之精華醇粹方潛然默長日積月纍有無中生有之妙蓋存神於氣血之先也今人用丸補方有用至每服兩許者胃怯者安能免停滯之弊乎寓意草治金鑑春溫一症自述收功反掌並笑人見熱煩枯燥之症不敢用附子之愚夫溫病之異於傷寒者在不惡寒而渴也今身踡足冷非不惡寒矣半渴不渴則非渴矣且不載脈象何所據而謂之春溫邪蓋金鑑自是虛陽不歸陰火上盛更感於寒寒邪束其浮陽之夾陰傷寒證也豈溫病邪果系春溫而投麻附細辛及附子瀉心二方覆杯而斃矣世有患痼疾而百藥不靈往往奉行感應篇陰騭文而愈此有至理蓋吾人身根於氣而氣根於性性者氣之生理也氣虛而投以參耆補氣亦惟氣中之生理也未屈者方能有功若生理已屈補氣何益蓋惟積德行善乃所以直接生理而氣自充長以理為氣之先天也蓋人之生也直而性本善積德行善則隱微之地自有一種愜意悅心之處故生理自完而生氣常伸所謂義理之悅心猶芻豢之悅口也芻豢悅口可以滋養其身義理悅心獨不能溫存其性乎性得養而生理日充生理充則生氣自日新矣此實理也老子曰死而不亡者壽蓋性無生死生生不息者也完得性分與天同壽生死且不足計況區區病幻乎治病必求其本如同為濕熱之證因濕而蒸熱者必化其濕而熱方退因熱而蒸濕者必清其熱而濕方行不可混也又如同為白舌口渴之證若濕邪內聚而津液不主上承者當以舌白為據而用辛溫開濕不以口渴為忌也若燥邪上受津液不司通降者當以口渴為據而用清潤化燥不以舌白為拘也又可混治乎看虛勞全要留心胃納胃納強者或清潤或滋填可隨證施治若胃納不佳或大便不實便當以照管胃關為要不但清潤非宜滋填尤非宜也看病總要在空處盤旋方能得之環中超之象外柴胡加龍骨牡蠣湯徐靈胎謂能祛肝膽驚痰可治癲癇桂枝去芍藥加蜀漆龍骨牡蠣救逆湯葉天士用以治瘧疾之汗多亡陽者並可為用古之法四君補氣參苓通補胃氣朮草守補脾氣四物補血芎歸通補絡血地芍守補經血皆當分別以用六淫之邪惟寒濕傷陽風暑燥火則無不傷陰故治傷寒以存津液為要六經實熱總清陽明六經虛寒總溫太陰六淫之感於一時者輕伏氣之積以數年者重感於一時不外六經積以數年乃在異所即募原及奇經之屬衛氣不到之區故病不發則相安於不覺如小兒之痘疹然必異氣外觸而後伏邪內動也若夫冤業之邪則尤甚焉蓋伏氣雖隱於無形終為病氣氣尚有跡故神仙鼓八脈之氣而衛陽通徹則邪無所容而終身無病冤業不然乃歷劫以來無明所結蘊於神光不照之區而癡情不斷暗昧難求非內照功深天心洞徹超然物外者未易燭其隱而消其障也圓覺經曰有形之罪可免其如無形乎中庸曰君子之所不可及者其惟人之所不見乎此醫者第一義諦也不能醫無形之病非至醫也六淫云乎哉伏氣云乎哉讀生氣通天論而知天人一理天道生生不息人能體天地好生之心以為心修仁敬孝悌慈信之行以崇生生之本是謂養生主也若不能於天心上修仁敬孝悌慈信之行而徒務靜功縱能完復精神終歸變滅蓋不合上古通天之旨而自絶於生生之本矣烏得死而不亡之妙諦哉邪入太陽先傷營衛而營衛實心肺主麻黃治衛肺家藥也桂枝治營心家藥也推而進之胃為衛之本脾為營之源故麻黃有加石膏法散肺衛兼清胃氣桂枝有加飴糖法和心營兼補脾血也知心營肺衛之統於太陽則知葉天士所謂溫邪上受首先犯肺逆傳心包之說仍不外太陽治也蓋葦莖湯之泄肺衛犀角地黃湯之清心營雖曰手經實太陽地界也今人知太陽主表而不知太陽之裡今人知膀胱為太陽之裡而不知胸膈之上心營肺衛之間皆太陽所統也仲景不云乎病有發熱惡寒者發於陽也此太陽之表表之表也無熱惡寒者發於陰也此太陽之裡表之裡也故誤下而為結胸痞症則用大小陷胸及瀉心等方曰瀉心曰陷胸明明心胸之間為太陽所統也此明證也今人惟不知太陽里病故於發陽發陰之旨往往不得其解雖尚論論翼具空前絶後之識者亦於此昧昧焉殊不知發陽發陰同屬太陽同為熱病以發為中陰者固非以無熱為未熱者又寧免支離之誚乎病發於陽表之表者麻黃證也病發於陰表之裡者即陽明之表梔豉證也今之溫熱病用清心涼膈散即梔豉之意病發於陰之治法也亦有發熱惡寒而參用蔥蘇葛根之屬者即麻桂之意矣而不竟用麻桂者以江浙溫暖人多蘊熱無西北嚴寒之故也若冬春之交如萎蕤湯陽旦湯因亦未始不用也蓋發者自內而出之謂發於陽發於陰雖不同而同為熱自內出之太陽證故曰熱病者皆傷寒之類也此旨不明千家聚訟而後葉天士有心營肺衛之辨可謂發仲景千古之蘊惜其不引太陽篇中原文為證而反牽合吳氏溫疫論之說亦一失也傷寒只一而傷寒之類非一也治傷寒只三法汗以麻黃吐以瓜蒂下以承氣而治傷寒之類非僅三法也世之病傷寒者少病傷寒之類者多世之醫者僅知三法者多而能立方於三法之外者少此仲景所以有傷寒論之作也桂枝湯辨非麻黃證也梔豉湯辨非瓜蒂證也瀉心湯辨非承氣證也種種妙義無非為株守三法者設是教人辨傷寒之類非教人治傷寒也是教人慎用三法非教人用三法也此仲景之苦心也而後人乃謂仲景立汗吐下三法以治傷寒其然乎或謂怔忡病不全屬心亦當責之腎夢遺病不全屬腎亦當責之心可知心腎之相關矣太陽太陰少陰大旨宜溫少陽陽明厥陰大旨宜清甲乙歸戊土燥化壬癸歸己土濕化此傷寒之大局也喻西昌獨闢秋燥葉香岩大闡手經自朱南陽郭白雲以來誠可謂獨開生面別樹一幟蓋溫熱之邪皆從燥化而心營肺衛實當衝要三焦之火用太過二腸之津液被戕必致心包之清竅不宣而成內閉外脫之症此清燥救肺犀角地黃以及至寶牛黃紫雪等方實足以發仲景未宣之蘊然其為病也多燥而少濕有熱而無寒故只須以上焦津液為主而清解絡熱不比正傷寒之頭緒錯雜應變多方之難治也陽氣者若天與日吾人生身之命之本也蓋人之一身五官百骸皆死物也所以運此五官百骸者是活物所謂陽氣也陽氣有通而無塞充滿於五官百骸九竅十二臟而運轉不息或外邪觸之或情志郁之則失其健運之常而通者塞矣然治之者仍須目注其陽氣之屈伸陽機之出入而利導之則病無不解所謂無形令其轉旋則三焦自能升降如庖丁解牛行所無事而塞者自通此決病第一要訣不可不精察者也若不明陽氣為生人之本則受病者誰受發病者誰發而能卻此病者果藉誰之力而卻之皆茫無把握矣陽氣作而人因以生陽氣息而人因以死一陽氣之屈伸耳故人雖有死生之殊而彼陽氣者初未嘗與生俱生與死俱死也蓋其為氣至大至剛以直養而無害則塞於天地之間而超於死生之外天體純陽有通無塞有直無曲有生無死故為醫而能通人之塞直人之曲生人之死便是天醫仲景叔和而後能得傷寒之大旨者千金翼本事方活人書補亡論總病論數種為最精今之讀傷寒論者類取後世無實之空言為祕本欲其藝之出人頭地也難矣內經治傷寒只汗下二法故仲景雖分六經而陽明太陽證最多寒病統於太陽熱病統於陽明胸痞為少陽證者以胸為太陽之裡又為陽明之表表裡之間正少陽也然太陽自是太陽病瀉心證也陽明自是陽明病梔豉證也少陽自是少陽病柴胡證也不可混治何以別之太陽必無熱惡寒陽明必發熱不惡寒少陽必往來寒熱也胸痞為溫熱時邪所必見之證而今之醫者亦不外柴胡梔豉瀉心三法以治但不能溯其源流未必一一對症故表而出之溫熱之胸痞蓋陽明病也劉河間王安道陶尚文吳又可張鳳逵諸公已暢言溫熱矣後此如喻嘉言周揚俊張路玉葉天士薛生白皆精於溫熱之源流者也可知溫熱之不少於傷寒矣吾四十年越歷以來凡病之屬陽明少陽厥陰而宜滋清者十有八九如太陽太陰少陰之宜溫散溫補者百無一二不知時代之不同歟抑南北之異也四明心法亦只論得溫熱故以養陰為要若論傷寒法豈止此太陽病二三日不得臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸寒實結胸未止者此作協熱利未止者下原有四日復下之五字蓋衍文結胸宜枳實理中湯協熱利宜桂枝人參湯注者以結胸為陷胸證大謬故拈出之太陽與陽明合病必自下利葛根湯主之千金翼云一作葛根黃芩黃連湯其義似長太陽主表陽明主裡焉得合病惟太陽之裡即陽明之表同位於心胸之間故合病也而半表半裡正屬少陽心胸之間又少陽所轄故三陽皆得合病而三陰則無者以不涉心胸故也知此則不但合病並病之由心胸以轉旋即傳經亦由心胸以傳化可知矣蓋三陽皆受氣於胸中胸中為諸陽之本故也巨陽為諸陽主氣而陽明少陽不過因病以變名非別有一氣也病在表則為太陽病在裡則為陽明病在半表半裡則為少陽在表在裡及半表半裡者病也曰太陽曰陽明與少陽者氣也病有風寒暑濕之不齊故面目不一而應病之氣則同此巨陽初無二致其為之陽明少陽者猶之金閶之有胥門齊門非不另有其門然只是金閶而已太陽為氣實陽明為血實惟少陽為血弱氣虛故不可汗下三陰惟少陰有承氣證急下以存津液也厥陰太陰並禁下厥陰篇所謂諸厥宜下者是下其熱蓋酸苦以泄之非謂承氣也太陰篇曰若下之必胸下結硬亦非謂誤下太陰也言縱有實熱應下之症見太陰即不可下下之必陽邪內陷太陰症仍在而反增胸下結硬矣要知厥陰內寄相火下之利且不止太陰為至陰之臟下之豈僅胸下結硬而已耶再厥陰何以下之便利不肯止蓋木火本傷脾陰苦寒復損脾陽陰陽並傷脾將絶矣利何由止用烏梅丸者一以殺木火之威一以救脾陽之困蓋誤下者厥陰而利不止已屬太陰故剛柔之必並進也歟少陽是開合之樞太陽由胸而開陽明由胸而合也少陰亦開合之樞太陰由腹而開厥陰由腹而合也三陽惟少陽症最少表邪不及少陽里邪亦不及少陽也三陰惟少陰症最多寒邪能犯少陰熱邪亦能犯少陰也少陽無死症二陽同衛之也少陰多死症二陰同賊之也陽道實故風寒實邪從太陽汗之燥熱實邪從陽明下之邪之微者從少陽和之陰道虛故寒濕虛邪從太陰溫之風熱虛邪從厥陰清之虛之甚者從少陰補之陽道雖實而少陽為陽之微故和而兼補陰道本虛而少陰尤虛之極故補之須峻千金活人有虛煩一症此症甚多而今人往往不知誤治者多矣古法用竹葉湯豫常用溫膽湯加麥冬生地甚效又百合一症熱病後肺胃陰虛而餘邪不清者亦所常有今人都不識也熱已離表汗之既遲熱未入腑下之太早故用白虎直清陽明使熱邪從小便而出所謂氣化則能出矣當識五苓化寒水之氣白虎化燥金之氣也肝虛絡痛旋覆花湯佐以芎歸桃柏二仁甚效熱者金鈴子散寒者當歸四逆湯並皆佳妙少陰主虛故太陽之寒陽明之燥太陰之濕厥陰之風並能犯之與少陽之汗下溫清皆不及者天淵少陽為中清之府中正之官不染一塵者歟太陽宜汗陽明宜下少陽宜和太陰宜溫少陰宜補厥陰宜清此千古不易之法但病有合並方有離合故治有先後緩急彼此之殊須如星家之推命縱同此八字而取用有大不同者取用或差全不驗矣醫家亦然病不外此六經治不外此六法而錯綜變化之間倘取用不真縱方能對症往往先後倒施緩急失機而貽禍況方不對症乎故能讀古書猶非難事善取用神實醫家第一難也厥利不盡屬寒柯韻伯特集熱厥利症於厥陰篇後頗可嘉惠後進太陽用太陽方陽明用陽明方人知之也太陽不用太陽方陽明不用陽明方人不知之矣有一經兩經同病而方亦兼治之者有兩經三經同病而只治一經者有全不用此兩經三經之方而反治他經者有先治一經而再治一經者有從脈不從證有從證不從脈者有脈證並不從而得之象外者仲景書中無巧不備皆所以教人善取用神之法也太陽病頭痛至七日以上自愈者以行其經盡故也此指本氣若欲作再經者針足陽明使經不傳則愈此指病氣七日再傳太陽之說及本氣來復非為病氣傳入厥陰而再傳太陽也若欲作再經亦非說七日以上不愈而欲作再經者針足陽明使歸併陽明也古人謂杜詩可以治瘧此有至理要知好文字皆可以治病不獨杜詩也知此則知符篆卻邪之理矣總之心精結撰無不通靈心力到處感鬼格神況區區病魔乎但非平日心地上具有功夫臨時便少定力徒恃符篆亦不靈也六經惟厥陰最難調治蓋厥陰內寄相火本屬有熱無寒縱使直受寒邪症現四逆脈細仲景只用當歸四逆而不與薑附可悟也而烏梅丸中乃桂附辛姜並進者何也蓋厥陰火鬱必犯陽明陽明氣實則厥火自由少陽而散苟胃陽不支則木邪乘土必撤陽明之合而為太陰之開以至吐利交作亡陽可畏故必重用溫脾俾以就陽明之實而不陷太陰之虛此轉絶陰為生陽以破絶陰之法也否則酸苦等味雖有清泄厥陰之長能無害胃傷陽之弊乎總之厥陰症全以胃陽為用神胃陽勝則轉出少陽而病退胃陽負則轉入太陰而病進觀仲景用理中以治霍亂其義又易見也害生之病惟郁為最養生之方惟樂為先樂者不郁之謂夫人之神氣好伸而惡屈其屈伸之機在自欺自慊之微不僅能達觀之謂也但人非賢聖焉能在在慎獨當此缺陷世界苟能曠觀一切超然物外不為薄俗炎涼所動亦養生之要矣人有無故而常鬱鬱不樂者此由膽氣不伸膻中之陽不能敷布而然當用十味溫膽合逍遙治之或甘麥大棗煎送枕中丹亦妙不得意人往往犯此醫者見其脈澀不知氣鬱誤為陽虛者多矣嘉慶甲子以來天氣偏溫往往暑熱太過冬令少藏人在氣交之中是以腎真不固脾無正火木失土培而不條達郁久火發反凌脾土多致霍亂氣脫治之之法大概烏梅丸是其主方溫通脾腎之陽清泄厥陰之熱並行不悖也就中有宜先溫而後清者有宜先清而後溫者有一溫而肝火自散不必再清者有一清而真陽自回不必再溫者有以填下而氣固者有以培中而木達者有用芳香而陽始通者有用金石而氣方定者種種治法難以縷舉在人知其綱要而隨機應變不可執死板以求然大旨則不能出烏梅丸苦辛酸協濟之範圍耳熱厥以白虎湯為主方清化燥金也而暑邪則加人參者以其脈虛也疸瘧則加桂枝者以其骨節煩痛也古人用藥一絲不亂如此又可見暑病而骨節煩痛亦可加桂枝疸瘧而脈虛亦可加人參醫必執方而不執方醫不執方而必執方也太陽病發熱惡寒熱多寒少宜桂枝二越婢一湯脈微弱者此無陽也不可更汗此倒筆法注家並謬故訂正之周慎齊有腎不納氣脾無正火肝木火起之說查庚辰辛巳二年大疫正合此義蓋庚辰春夏之交雨水太過濕邪內聚長夏酷熱四十餘日陽氣偏泄冬冷過暖少陰不藏故是歲已有霍亂轉筋驟脫之症然猶未甚至辛巳春分時肝木鬱發之證十人而九所謂腎不納氣肝木起火也夏至後或吐瀉或筋急須臾即死閩廣最甚江浙繼之豈非其地溫暖陽氣偏泄以脾無正火而風動濕鬱則陰閉陽脫歟後竟蔓延北省遠及外洋是又非可以常理測矣籲安得慎齊其人起而一救此生靈歟少陽主骨故柴胡為骨蒸要藥鳳尾草背有金星故又名金星草其金星即海金沙也用其根洗去泥打爛同雞子清研和如膏入麝香少許厚敷臍上一日一換小便即長退水腫甚速不動藏府信良方也綱目有青蛤丸用蛤粉同生蒜頭打和乾溼得所丸如梧子大每服二十丸空心開水吞送亦小便漸長而腫自退上方治熱此方治濕鮮鮮合歡皮兩許煎服治雞盲頗效俗名烏絨樹吐蛔瓦松炙存性等分研細和入制過爐甘石內敷爛弦風眼極有神功青鹽水煅管仲為末三錢開水調化止血熱妄行吐衄等症可代十灰散一味白及微炒為末糯米漿糊為丸每服三錢開水吞送治肺癰神效十服全安袁簡齊子不語誤作白朮想及術聲音相近聽未確耳疥瘡外治無一定之方惟每日煎鮮首烏一兩川萆薢五錢服一二十劑重者二三十劑無不效鮮鮮蒼耳葉搓熟塞鼻男左女右截瘧甚效腎囊濕癢用山茱萸皮核煎洗一二次即安小兒小水不通脹急欲死囫圇蓮房一隻煎服即通鮮者尤妙對口疽用白狗矢甘蔗渣煅等分研細蜜調厚敷患處便漸高起不必洗去日日厚封其上自然流出毒水而愈婦人玉門腐爛用鹼一斤研碎置淨桶中衝入滾水半桶坐上薰之衣被圍緊勿令泄氣一二次自安小兒關𤺪疒貢頭揀食鹽中硬塊填入爛孔令滿外蓋膏藥即愈雞肝丸治小兒疳積目翳肚大唇紅渴飲泄瀉此神方也琥珀西黃真珠麝香冰片蘆薈辰砂雄黃青黛百草霜各一分用田雞肝煮熟研和為丸如緑豆大每服二三分醇酒送下金不換治一切無名腫毒麝香三錢辰砂二錢青紅娘去頭翅三錢雄黃五錢共為細末摻膏藥上貼蜈蚣咬用鼻涕乾擦上立刻止痛雖符禁無此神速定風散治豬羊癇症此方治膠痰實症虛者宜參茸河車之屬庶可望安魚膠二兩鉛粉一兩魚膠炒皂礬一兩醋煅紅辰砂三錢飛共為末每服二錢酒調下胡椒雄黃等分為末摻膏藥上貼臍截瘧馬錢子母丁香各四枚為末摻膏藥上貼臍止痢或用米飲和丸安入臍中外蓋膏藥亦妙疔膏以透明松香瀝青各五錢萆麻子肉二錢五分二味大青石上以鐵錘錘至前藥黏在錘上黏起如清水一般為度又加飛丹一錢再錘數百下收小瓷杯內如遇初起疔毒以新青布照疔大小攤膏藥貼之痛即止少頃毒水漸漸流盡疔根如燈芯一條拔出仍將原膏貼上至重者再換一膏全愈矣攤法取瓷杯隔湯燉化竹箸攤約一文錢厚六汁飲治咽喉痛久形枯虛熱懨懨就斃者十年陳醬汁一兩竹瀝一兩薑汁五分白萊蔔汁五錢石菖蒲汁一錢枳實磨汁一錢五分以上六汁調和隔湯燉溫徐徐頻服愈後接服雪羹兩月盤肛楊梅瘡用熟石膏一兩黃升丹四分研細摻神效海浮散雖能止痛然亦能長肉毒未盡者不可輕敷宜壽星散為妥灶馬俗名蟑螂徽州人呼為油蟲炒熟研細每服二三錢井水調服治小兒疳積神效漢口膏藥陶丹十兩銅緑十兩蜜陀僧五錢白桐油四十兩先將桐油煎開下陶丹不住手攪看油色紫黑下銅緑不住手攪俟油中泡破青煙起下蜜陀僧不住手攪煎至滴水成珠傾入瓷器臨用攤貼此方甚佳豫常用木鱉半斤煎麻油三斤以代桐油尤妙呼膿用壽星散水澄南星粉解毒用生肌散生石膏熟石膏赤石脂收口用海浮散乳香沒藥去腐用烏金膏巴豆炭外瘍初起用遠志膏塗最妙二味拔毒散亦妙七里神效散歸尾二錢乳香一錢五分兒茶二錢五分紅花八錢沒藥二錢五分硃砂二錢五分雄黃八錢血竭二錢五分冰片三分麝香三分以上諸藥共研為細末治刀傷跌打損傷昏迷沉重者用溫熱水沖服三錢輕者服二錢外以藥掩刀口傷處如跌打未破者止宜沖服不必敷掩約人行七里即愈屢試屢驗真神方也下疳方鉛粉一兩乳香二分半沒藥二分半雄黃二分半銀硃二分半輕粉二分半用豬腰子剖開搽藥其上扎患處陳年爛腿方鉛粉四兩龍骨二兩硃砂二錢白占二兩牡蠣二兩輕粉二錢香油調圍邊方銅緑一兩煙膠四兩回丹二兩枯礬三兩膽礬一兩人中白一兩香油調圍
